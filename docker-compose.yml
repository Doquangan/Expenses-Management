version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: expenses_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expenses_backend
    ports:
      - "3000:3000"
    environment:
      # Override the MongoDB connection URL from your local .env
      - MONGODB_URI=mongodb://mongodb:27017/expenses_management
      # You can manually set other keys from .env directly or pass the whole .env file
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
